<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة الأزهار 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{--midnight:#1a0a1e;--gold:#e86bac;--gold-light:#f9a8d4;--gold-dim:#9d3a6e;--cream:#fdf2f8;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:linear-gradient(135deg,#1a0a1e 0%,#2d0f3a 50%,#1a0a1e 100%);color:var(--cream);font-family:'Tajawal',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl;position:relative;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 25%,rgba(232,107,172,0.09) 0%,transparent 40%),radial-gradient(circle at 85% 75%,rgba(168,85,247,0.08) 0%,transparent 40%),radial-gradient(circle at 50% 50%,rgba(251,146,60,0.05) 0%,transparent 50%);pointer-events:none;}

  .petal{position:fixed;pointer-events:none;z-index:0;animation:petalFall linear infinite;opacity:0.45;}
  @keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0.6;}100%{transform:translateY(110vh) rotate(360deg);opacity:0;}}

  .container{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:36px;padding:48px 24px;text-align:center;width:100%;max-width:560px;}

  .flower{font-size:80px;animation:bloom 4s ease-in-out infinite;filter:drop-shadow(0 0 24px rgba(232,107,172,0.5));}
  @keyframes bloom{0%,100%{transform:scale(1) rotate(-3deg);}50%{transform:scale(1.08) rotate(3deg);}}

  h1{font-family:'Amiri',serif;font-size:clamp(36px,8vw,64px);color:var(--gold-light);text-shadow:0 0 40px rgba(232,107,172,0.4);line-height:1.2;}

  p{font-size:17px;color:rgba(253,242,248,0.5);line-height:1.8;max-width:380px;}

  .divider{display:flex;align-items:center;gap:12px;width:100%;color:rgba(232,107,172,0.3);font-size:20px;}
  .divider-line{flex:1;height:1px;background:rgba(232,107,172,0.2);}

  .cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;}
  @media(max-width:480px){.cards{grid-template-columns:1fr;}}

  .card{display:flex;flex-direction:column;align-items:center;gap:14px;padding:32px 20px;background:rgba(45,15,58,0.9);border:1px solid rgba(232,107,172,0.2);border-radius:24px;text-decoration:none;color:inherit;transition:transform 0.2s,border-color 0.2s,box-shadow 0.2s;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(249,168,212,0.4),transparent);}
  .card:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 12px 32px rgba(232,107,172,0.2);}

  .card-icon{font-size:44px;}
  .card-title{font-family:'Amiri',serif;font-size:22px;color:var(--gold-light);}
  .card-desc{font-size:13px;color:rgba(253,242,248,0.4);line-height:1.6;}

  .badge{position:absolute;top:12px;left:12px;font-size:10px;letter-spacing:1px;padding:3px 10px;border-radius:20px;font-weight:600;}
  .badge-ctrl{background:rgba(232,107,172,0.12);border:1px solid rgba(232,107,172,0.3);color:var(--gold-dim);}
  .badge-play{background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);color:#c084fc;}

  .footer{font-size:13px;color:rgba(253,242,248,0.2);}
</style>
</head>
<body>
<div class="container">
  <div class="flower">🌸</div>
  <h1>مسابقة الأزهار</h1>
  <p>اختر دورك — المضيف يتحكم باللعبة واللاعبون ينضمون برمز الغرفة 🌺</p>
  <div class="divider"><span class="divider-line"></span><span>🌼</span><span class="divider-line"></span></div>
  <div class="cards">
    <a href="controller.html" class="card">
      <span class="badge badge-ctrl">المضيف</span>
      <div class="card-icon">🎮</div>
      <div class="card-title">المتحكم</div>
      <div class="card-desc">أنشئ الغرف وابدأ الأسئلة وتابع الإحصائيات</div>
    </a>
    <a href="players.html" class="card">
      <span class="badge badge-play">لاعب</span>
      <div class="card-icon">🌷</div>
      <div class="card-title">اللاعبون</div>
      <div class="card-desc">أدخل رمز الغرفة وانضم إلى المسابقة</div>
    </a>
  </div>
  <div class="footer">زهور جميلة لجميع 🌺</div>
</div>
<script>
const P=['🌸','🌺','🌼','🌷','💐','🪷'];
function spawnPetals(){
  for(let i=0;i<10;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='petal';
      el.textContent=P[Math.floor(Math.random()*P.length)];
      el.style.left=Math.random()*100+'vw';
      el.style.fontSize=(12+Math.random()*14)+'px';
      el.style.animationDuration=(10+Math.random()*8)+'s';
      el.style.animationDelay=(Math.random()*4)+'s';
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),22000);
    },i*500);
  }
}
spawnPetals(); setInterval(spawnPetals,15000);
</script>
</body>
</html>
