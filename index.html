<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مسابقة رمضان</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight: #0a0e1a; --gold: #c9a84c;
    --gold-light: #f0d080; --gold-dim: #8a6f2e; --cream: #f5ead0;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--midnight); color: var(--cream);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    direction: rtl;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(60deg,transparent,transparent 40px,rgba(201,168,76,0.03) 40px,rgba(201,168,76,0.03) 41px),
      repeating-linear-gradient(-60deg,transparent,transparent 40px,rgba(201,168,76,0.03) 40px,rgba(201,168,76,0.03) 41px);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; top:-200px; left:50%; transform:translateX(-50%);
    width:700px; height:700px;
    background:radial-gradient(circle,rgba(201,168,76,0.07) 0%,transparent 70%);
    pointer-events:none; z-index:0;
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center; gap: 36px;
    padding: 48px 24px; text-align: center; width: 100%; max-width: 560px;
  }

  .lantern {
    font-size: 80px;
    animation: swing 3s ease-in-out infinite;
    filter: drop-shadow(0 0 24px rgba(201,168,76,0.5));
  }
  @keyframes swing { 0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);} }

  h1 {
    font-family: 'Amiri', serif;
    font-size: clamp(36px, 8vw, 64px);
    color: var(--gold-light);
    text-shadow: 0 0 40px rgba(201,168,76,0.35);
    line-height: 1.2;
  }

  p {
    font-size: 17px; color: rgba(245,234,208,0.5);
    line-height: 1.8; max-width: 380px;
  }

  .divider {
    display: flex; align-items: center; gap: 12px;
    width: 100%; color: rgba(201,168,76,0.25); font-size: 20px;
  }
  .divider-line { flex:1; height:1px; background:rgba(201,168,76,0.18); }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; }
  @media(max-width:480px){ .cards { grid-template-columns: 1fr; } }

  .card {
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    padding: 32px 20px;
    background: rgba(15,23,41,0.9);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 24px;
    text-decoration: none; color: inherit;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    position: relative; overflow: hidden;
  }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,rgba(201,168,76,0.35),transparent);
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
    box-shadow: 0 12px 32px rgba(201,168,76,0.15);
  }

  .card-icon { font-size: 44px; }
  .card-title { font-family:'Amiri',serif; font-size: 22px; color: var(--gold-light); }
  .card-desc { font-size: 13px; color: rgba(245,234,208,0.4); line-height: 1.6; }

  .card.controller { border-color: rgba(201,168,76,0.3); }
  .card.players    { border-color: rgba(45,168,168,0.3); }
  .card.players:hover { border-color: #2da8a8; box-shadow: 0 12px 32px rgba(45,168,168,0.15); }

  .badge {
    position: absolute; top: 12px; left: 12px;
    font-size: 10px; letter-spacing: 1px;
    padding: 3px 10px; border-radius: 20px; font-weight: 600;
  }
  .badge-ctrl { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.3); color:var(--gold-dim); }
  .badge-play { background:rgba(45,168,168,0.12); border:1px solid rgba(45,168,168,0.3); color:#2da8a8; }

  .footer { font-size: 13px; color: rgba(245,234,208,0.2); }
</style>
</head>
<body>
<div class="container">
  <div class="lantern">🌙</div>

  <h1>مسابقة رمضان</h1>
  <p>اختر دورك للبدء — المضيف يتحكم باللعبة واللاعبون ينضمون برمز الغرفة</p>

  <div class="divider">
    <span class="divider-line"></span>
    <span>❖</span>
    <span class="divider-line"></span>
  </div>

  <div class="cards">
    <a href="controller.html" class="card controller">
      <span class="badge badge-ctrl">المضيف</span>
      <div class="card-icon">🎮</div>
      <div class="card-title">المتحكم</div>
      <div class="card-desc">أنشئ الغرف وابدأ الأسئلة وتابع الإحصائيات</div>
    </a>

    <a href="players.html" class="card players">
      <span class="badge badge-play">لاعب</span>
      <div class="card-icon">👥</div>
      <div class="card-title">اللاعبون</div>
      <div class="card-desc">أدخل رمز الغرفة وانضم إلى المسابقة</div>
    </a>
  </div>

  <div class="footer">رمضان كريم 🪔</div>
</div>
</body>
</html>
